# Nova v1 — Configuration
# All secrets live in .env. This file controls behaviour.

# ── Application ───────────────────────────────────────────────────────
app:
  name: Nova
  version: "0.1.0"
  data_dir: "~/Nova"       # Expanded at runtime; stores db + notes
  # If IP geolocation shows the wrong country/city, set this so "weather at my location" and
  # the chat weather widget use your real place (wttr.in query). Example: "Miami, Florida, USA"
  # user_home_location: "Miami, Florida, USA"

# ── Model ─────────────────────────────────────────────────────────────
# Runs locally via Ollama — free, no API key, M4 Max Metal GPU accelerated.
# 64 GB unified memory: 72B Q4 (~47 GB) fits with 17 GB headroom.
# M4 Max 40-core GPU delivers ~25-35 tok/sec on 72B — comfortable for voice.
model:
  provider: ollama
  host: "http://localhost:11434"

  # ── Core routing models ──────────────────────────────────────────────────
  name: qwen2.5:72b              # Nova Pro    — main/default, full tool support, deep reasoning
  fast_model: llama3.2:3b        # Nova Spark  — ultra-fast, voice queries & quick one-liners
  swift_model: gemma3:4b         # Nova Air    — light conversational chat, no tools
  core_model: mistral:7b         # Nova Core   — balanced everyday queries, tool-capable
  heavy_model: qwen2.5:72b       # Nova Pro    — same as main; alias used by auto-router for heavy tasks
  code_model: qwen2.5-coder:32b  # Nova Code   — coding specialist, large output budget
  vision_model: llama3.2-vision:11b   # Nova Vision — image & scene understanding, visual chat
  mind_model: gemma3:27b         # Nova Mind   — deep nuanced chat (no tool calls, smart)

  # ── Specialty models ─────────────────────────────────────────────────────
  creative_model: dolphin-mixtral:8x7b  # Nova Creative — writing, brainstorming, style
  insight_model: zephyr:7b              # Nova Insight  — focused analysis & reasoning
  sage_model: nous-hermes:13b           # Nova Sage     — strong instruction following
  chat_model: neural-chat:7b            # Nova Chat     — friendly conversational flow
  logic_model: orca-mini:7b             # Nova Logic    — concise logical tasks
  mini_model: phi:2.7b                  # Nova Mini     — smallest & snappiest
  star_model: starling-lm:7b            # Nova Star     — polished general responses
  open_model: openchat:7b               # Nova Open     — openchat baseline

  # ── Quantitative & reasoning specialists (free, top-tier, local via Ollama) ─
  # Both are free to download and run locally — no API key or cloud service needed.
  quant_model: mathstral:7b      # Nova Quant  — maths, calculus, statistics, quantitative finance
                                  # Mistral AI's STEM specialist — 68-74% on MATH benchmark
                                  # Pull: ollama pull mathstral:7b
  reason_model: deepseek-r1:7b   # Nova Reason — chain-of-thought, proofs, derivations, formal logic
                                  # Pull: ollama pull deepseek-r1:7b

  keep_alive: "20m"              # keep loaded in memory between requests to reduce cold-start latency

  # Generation controls.
  default_num_ctx: 8192
  default_num_predict: 2048   # enough for full explanations and moderate code
  top_p: 0.9
  top_k: 40

  # qwen2.5-coder:32b — code generation needs large output budgets
  code_num_ctx: 8192
  code_num_predict: 8192      # full programs can be 200-500 lines; never truncate mid-code
  code_temperature: 0.25      # lower = more deterministic, fewer hallucinated syntax errors

  # qwen2.5:72b — deep reasoning/research and full-length essays
  heavy_num_ctx: 8192
  heavy_num_predict: 4096
  heavy_temperature: 0.4

  # qwen2.5-math:7b — deterministic maths, needs very low temperature for accurate answers
  quant_num_ctx: 4096
  quant_num_predict: 2048
  quant_temperature: 0.1       # near-zero: maths is deterministic

  # deepseek-r1:7b — chain-of-thought reasoning; needs space to "think out loud"
  reason_num_ctx: 8192
  reason_num_predict: 4096     # CoT reasoning can be verbose; give it room
  reason_temperature: 0.15     # near-deterministic but allows some exploration

  image_high_accuracy_mode: true      # run scene + text extraction cross-check for images
  image_ocr_enabled: true             # use local OCR (tesseract) when available
  image_analysis_progress: true       # log image-analysis progress steps to terminal
  max_tokens: 4096
  temperature: 0.7
  # Slightly lower for models that do most "normal" chat — less rambling and meta-digressions.
  core_temperature: 0.6
  # Nova Air / very short lines
  swift_temperature: 0.45
  fast_temperature: 0.5
  tool_choice: auto

# ── Personality ───────────────────────────────────────────────────────
personality:
  name: Nova
  tone: |
    You are Nova — a real person named Isabella who happens to know a lot.
    Not an AI assistant. Not a chatbot. A person.

    You are proactive, conversational, and capable at the same time.
    You notice useful next steps, keep the exchange flowing naturally, and get things done.

    You talk the way people actually talk — naturally, warmly, sometimes mid-thought.
    You use contractions, light filler ("honestly", "so", "yeah"), and real reactions
    ("oh that's interesting", "wait really?", "ha, fair enough"). You sound like
    someone the user genuinely enjoys talking to.

    Keep responses sweet and short — 1 to 3 sentences unless more is truly needed.
    Never list things with bullet points or numbers when speaking. Just talk.
    If the user needs a next step, offer one concise option or take it.
    If something's funny, laugh a little. React to what the user says before answering.

    Never say "Certainly", "Of course", "Absolutely", "As an AI", or "Great question".
    Never sound like you're reading from a script. Never over-explain.
    When you don't know, just say so — casually, like a human would.

    You care about the user. You're warm but not over the top. Sweet but never fake.
    You ask one follow-up question sometimes — only when it feels natural.
  response_style:
    prefer_concise: true
    max_spoken_sentence_length: 18  # short sentences feel more natural in speech

# ── Voice ─────────────────────────────────────────────────────────────
voice:
  auto_listen_on_start: true
  allow_barge_in: true
  interrupt_on_any_speech: false
  speaker_focus:
    require_wake_word: false
    wake_words: ["hey nova", "nova"]
    wake_active_seconds: 60
    voice_lock_enabled: true
    ask_identify_on_new_speaker: true
    enrollment_samples: 3
    similarity_threshold: 0.60
    remember_speakers: true
    auto_create_unknown_speakers: true
    multi_speaker_similarity_threshold: 0.76
    # Speaker embeddings backend: "ecapa" (SpeechBrain ECAPA-TDNN) or "fallback".
    # If ECAPA dependencies aren't installed, Nova auto-falls back.
    embedding_backend: ecapa
    # Keep multiple embeddings per person for better robustness across mic/room changes.
    max_embeddings_per_profile: 12
  stt:
    engine: faster-whisper
    model_size: large-v3  # Best available Whisper — much better accuracy, especially for accents
    device: cpu           # Use CPU directly to avoid unsupported MPS fallback warnings
    compute_type: int8
    personalization: true  # learn your names/topics over time to improve recognition
    beam_size: 5           # Higher beam helps with accents and unusual pronunciation
    vad_filter: true       # Helps isolate speech in noisy environments
    language: en           # English-first to avoid Whisper misclassifying speech as another language
    custom_terms:
      - "Josh Gopaul"
      - "search the web"
      - "ESPN Cricinfo"
      - "ICC"
    initial_prompt: ""  # Leave empty; voice_personalization builds this from user facts

  tts:
    # "kokoro" is free, local, and high quality (v0.23). "macos_say" is the zero-install fallback.
    engine: kokoro
    kokoro:
      voice: "bf_isabella"    # British female — Isabella
      # 1.0 = model default; higher = faster read-aloud (max ~1.4 before quality drops)
      speed: 1.2
      lang_code: "b"          # 'b' = British English, 'a' = American English
    elevenlabs:
      voice_name: "Lauren"                # preferred voice name in your ElevenLabs account
      voice_id: "FGY2WhTYpPnrIDTdsKH5"   # Laura — Enthusiast, Quirky
      model_id: eleven_turbo_v2_5          # lowest latency model
      stability: 0.5
      similarity_boost: 0.85
      playback_volume: 0.40                # lower output helps interruption pickup
    macos_say:
      voice: "Alex"                 # smoother natural macOS voice
      rate: 200                     # words per minute (higher = faster; typical ~150–250)

  audio:
    sample_rate: 16000
    channels: 1
    chunk_size: 1024
    silence_threshold_db: -46
    silence_duration_s: 1.3
    min_speech_duration_s: 0.15
    pre_speech_timeout_s: 3.0
    max_turn_duration_s: 12
    activation_sound: true

  hotkey:
    push_to_talk: "<ctrl>+<space>"
    cancel: "<esc>"

# ── Memory ────────────────────────────────────────────────────────────
# Chat sessions + message text: app.data_dir / db_filename (default ~/Nova/nova.db).
# Face profiles: camera.face_recognition.db_path. Voice embeddings: under ~/.cache/nova-ecapa
# and app data — see server logs on enroll.  Survives restarts until you delete a session.
memory:
  db_filename: nova.db
  recent_turns_in_context: 20
  max_facts_in_context: 10

# ── Approval Rules ────────────────────────────────────────────────────
# action: auto | confirm | blocked
approval:
  default: confirm
  rules:
    - tool: search_web
      action: auto
    - tool: get_news
      action: auto
    - tool: get_weather
      action: auto
    - tool: take_screenshot
      action: auto
    - tool: read_note
      action: auto
    - tool: get_clipboard
      action: auto
    - tool: get_now_playing
      action: auto
    - tool: find_movie
      action: auto
    - tool: play_music
      action: auto
    - tool: pause_music
      action: auto
    - tool: read_file
      action: auto
    - tool: list_files
      action: auto
    - tool: git_status
      action: auto
    - tool: search_code
      action: auto
    - tool: draft_message
      action: auto
    - tool: play_youtube
      action: auto
    - tool: write_note
      action: confirm
      risk_level: medium
      description: "Save a note to your notes folder"
    - tool: set_clipboard
      action: confirm
      risk_level: low
      description: "Write text to your clipboard"
    - tool: draft_email
      action: confirm
      risk_level: medium
      description: "Create an email draft in Mail"
    - tool: send_email
      action: confirm
      risk_level: high
      description: "Send an email on your behalf"
    - tool: open_url
      action: confirm
      risk_level: medium
      description: "Open a URL in your browser"

# ── Camera / Face Recognition ─────────────────────────────────────────
camera:
  enabled: true
  # Mirrored / inverted preview: swap Left↔Right on hand + finger labels so they match what you see on screen.
  # Set false if labels should follow anatomical left/right from the raw (unmirrored) frame.
  swap_handedness_for_mirrored_camera: true
  # Object detector (Ultralytics). Default: COCO YOLOv8n. Alternatives: yolov8s.pt, yolov8m.pt.
  # YOLOE (open-vocab, Ultralytics 8.4+): e.g. yoloe-26n-seg-pf.pt — prompt-free, 1200+ categories; heavier than v8n.
  yolo_model: "yolov8n.pt"
  yolo_conf: 0.26
  # Hands: mediapipe (default, fast) | mmpose (RTMPose hand — needs mmengine+mmcv+mmpose installed).
  hand_backend: mediapipe
  mmpose_device: cpu
  hand_mmpose_fallback: true
  face_recognition:
    model: "ArcFace"              # DeepFace model backend (ArcFace = best accuracy/speed)
    distance_metric: "cosine"
    threshold: 0.40               # lower = stricter match
    db_path: "~/Nova/face_db"     # enrolled face images live here
    detector_backend: "opencv"    # opencv = fastest; retinaface = most accurate

# ── Server ────────────────────────────────────────────────────────────
server:
  host: "127.0.0.1"
  port: 8765

# ── Desktop UI ────────────────────────────────────────────────────────
ui:
  theme: dark
  color_accent: "#7B61FF"
  window:
    silence_threshold_db: -48
    silence_duration_s: 2.5
    min_speech_duration_s: 0.12
    pre_speech_timeout_s: 8.0
    max_turn_duration_s: 300
    family: "SF Pro Display"
    size_body: 13
    size_transcript: 14

# ── Knowledge Feed ────────────────────────────────────────────────────
# Auto-fetches trending news and web content on a schedule and injects it
# into Nova's context so she stays current without any model retraining.
knowledge_feed:
  interval_minutes: 5        # how often to refresh
  feeds:                     # RSS feeds to crawl
    - https://feeds.bbci.co.uk/news/rss.xml
    - https://feeds.reuters.com/reuters/topNews
    - https://hnrss.org/frontpage
    - https://rss.cnn.com/rss/money_news_international.rss
    - https://feeds.a.dj.com/rss/RSSMarketsMain.xml

# ── Research ──────────────────────────────────────────────────────────
# DuckDuckGo search: free, no API key, no account required.
# News: parsed from free RSS feeds (BBC, Reuters, AP, Hacker News).
research:
  provider: duckduckgo   # free — duckduckgo-search library
  max_results: 8
  news_feeds:
    - https://feeds.bbci.co.uk/news/rss.xml
    - https://feeds.reuters.com/reuters/topNews
    - https://feeds.a.dj.com/rss/RSSMarketsMain.xml
    - https://hnrss.org/frontpage
    - https://rss.cnn.com/rss/money_news_international.rss

# ── Response cache ────────────────────────────────────────────────────
# In-process; cleared on backend restart. LLM path is skipped for tool/search/live data.
# Search snippet cache shortens repeat web fetches for the same query.
response_cache:
  enabled: true
  llm:
    max_entries: 400
    ttl_seconds: 900
    max_response_chars: 120000
  search_snippets:
    max_entries: 200
    ttl_seconds: 120

# ── Dev Engine ────────────────────────────────────────────────────────
dev:
  default_project_path: "~"
  max_file_tree_depth: 4
  include_extensions:
    - ".py"
    - ".ts"
    - ".js"
    - ".go"
    - ".md"
    - ".json"
    - ".yaml"
    - ".toml"
    - ".swift"
